name: Deploy to GitHub Pages

# production（ルート /）と preview（/preview/）を一括デプロイする。
#   preview / production のどちらへ push しても起動し、両ブランチをビルドして
#   1つのアーティファクトに束ね、Pages（ソース＝GitHub Actions）へ配信する。
#   - production → base=/        → サイトルート（独自ドメイン mahjo.academy）
#   - preview    → base=/preview/ → /preview/ 配下
# base は env（BASE_PROD / BASE_PREVIEW）。ドメイン構成が変わるときはここだけ書き換える。
# 正は docs/dev/development.md「デプロイ／ブランチ戦略」。

on:
  push:
    branches: [production, preview]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  BASE_PROD: /
  BASE_PREVIEW: /preview/

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # production → サイトルート
      - uses: actions/checkout@v4
        with:
          ref: production
          path: prod
      - name: Build production (base=${{ env.BASE_PROD }})
        working-directory: prod
        run: |
          npm ci
          npm run build -- --base=${{ env.BASE_PROD }}
      - name: Place production at site root
        run: |
          mkdir -p _site
          cp -r prod/dist/. _site/

      # preview → /preview/
      - uses: actions/checkout@v4
        with:
          ref: preview
          path: preview
      - name: Build preview (base=${{ env.BASE_PREVIEW }})
        working-directory: preview
        run: |
          npm ci
          npm run build -- --base=${{ env.BASE_PREVIEW }}
      - name: Place preview under /preview/
        run: |
          mkdir -p _site/preview
          cp -r preview/dist/. _site/preview/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
